name: Fetch AI-generated assets

on:
  push:
    paths:
      - assets/cdn-manifest.txt
      - .github/workflows/fetch-assets.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download assets listed in manifest
        run: |
          while read -r name url; do
            [ -z "$name" ] && continue
            case "$name" in \#*) continue ;; esac
            if [ ! -f "assets/$name" ]; then
              echo "Downloading $name"
              curl -fsSL --retry 3 -o "assets/$name" "$url"
            else
              echo "Skip $name (already in repo)"
            fi
          done < assets/cdn-manifest.txt

      - name: Commit downloaded assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "No new assets to commit"
          else
            git commit -m "Add AI-generated creature images from CDN manifest"
            git push
          fi
